    - data:
        code: "import json\n\ndef main(concrete_scene, greeting_str, obj_str):\n \
          \   # 輔助解析函數\n    def parse_json(data_str, default_val):\n        if not\
          \ data_str: \n            return default_val\n        if isinstance(data_str,\
          \ (dict, list)): \n            return data_str\n        try:\n         \
          \   return json.loads(data_str)\n        except Exception:\n           \
          \ return default_val\n\n    obj_data = parse_json(obj_str, [])\n\n    #\
          \ 處理 Greeting (確保是字串，處理 None 的情況)\n    greeting = str(greeting_str) if greeting_str\
          \ else \"\"\n\n    result = {}\n\n    # 1. 處理 objectives 資料來源 (判斷是 List\
          \ 還是 Dict)\n    objectives_list =[]\n    if isinstance(obj_data, list):\n\
          \        objectives_list = obj_data\n    elif isinstance(obj_data, dict):\n\
          \        objectives_list = obj_data.get(\"objectives\",[])\n        # 容錯：如果在輸入參數沒拿到\
          \ greeting，嘗試從字典裡挖出來\n        if not greeting:\n            greeting = obj_data.get(\"\
          greeting\", \"\")\n\n    result = {\n            \"concrete_scene\": concrete_scene,\n\
          \            \"greeting\": greeting,\n            \"objectives\": objectives_list\n\
          \        }\n\n    # --- 4. 輸出成漂亮的 JSON 字串 ---\n    return {\n        \"\
          final_json\": json.dumps(result, ensure_ascii=False, indent=2)\n    }"
        code_language: python3
