        code: "def main(extracted_texts: list) -> dict:\n    \"\"\"\n    Input:  Doc\
          \ Extractor output — array[string], one string per file.\n    Output: doc_text\
          \ (string), is_empty (bool)\n    \n    Why threshold 100: Doc Extractor\
