    - data:
        code: "import json\nimport re\n\ndef main(jsonArray: list):\n    valid_objectives\
          \ = []\n    valid_goals = []\n\n    if isinstance(jsonArray, list):\n  \
          \      for item in jsonArray:\n            # 1. 剔除因為截斷而產生的奇怪字串\n       \
          \     if isinstance(item, dict):\n                # 2. 檢查是否為「完整」的 Objective\n\
          \                # 只要確保它擁有排在比較後面的關鍵欄位 (例如 next_question)，就代表這一步沒被截斷\n  \
          \              if \"index\" in item and \"goal\" in item and \"pattern\"\
          \ in item and \"next_q\" in item and \"example\" in item and \"keywords\"\
          \ in item:\n                    valid_objectives.append(item)\n\n    # 重新編排\
          \ step_index，確保數字是連續的 (0, 1, 2...)\n    # 預防萬一中間有哪一步爛掉被剔除\n    for i, obj\
          \ in enumerate(valid_objectives):\n        obj[\"index\"] = i\n        raw_goal\
          \ = obj[\"goal\"]\n        \n        match = re.search(r'Accept:\\s*(.*?)(?:\\\
          .\\s*Reject:|\\s*Reject:)', raw_goal, re.IGNORECASE)\n        if match:\n\
          \            pure_goal = match.group(1).strip()\n        else:\n       \
          \     pure_goal = raw_goal\n\n        valid_goals.append(pure_goal)\n  \
          \      \n    actual_steps = len(valid_objectives)\n\n    return {\n    \
          \    \"result\": json.dumps(valid_objectives, ensure_ascii=False, indent=2),\n\
          \        \"actual_steps\": actual_steps,\n        \"goals\": valid_goals\n\
          \    }\n"
