    - data:
        code: "import json\nimport requests\nimport urllib.parse\n\ndef main(objectives_str):\n\
          \    # 你的 Pixabay API Key\n    PIXABAY_API_KEY = '56040978-b3050a6d77c77bf0e78367b22'\n\
          \    \n    objectives = []\n    \n    # 1. 安全解析輸入變數 (同時相容 List 和 String)\n\
          \    if isinstance(objectives_str, list):\n        objectives = objectives_str\n\
          \    elif isinstance(objectives_str, str):\n        try:\n            clean_str\
          \ = objectives_str.replace(\"```json\", \"\").replace(\"```\", \"\").strip()\n\
          \            objectives = json.loads(clean_str)\n        except Exception:\n\
          \            # 解析失敗時，確保回傳的是字串\n            return {\"updated_objectives\"\
          : objectives_str}\n    else:\n        # 如果傳進來是個鬼東西，回傳空陣列字串\n        return\
          \ {\"updated_objectives\": \"[]\"}\n\n    # 再次確認 objectives 是一個 list\n \
          \   if not isinstance(objectives, list):\n        # 如果不是 list (例如是 dict)，將其轉為字串回傳\n\
          \        if isinstance(objectives_str, (dict, list)):\n            return\
          \ {\"updated_objectives\": json.dumps(objectives_str, ensure_ascii=False)}\n\
          \        return {\"updated_objectives\": str(objectives_str)}\n\n    session\
          \ = requests.Session()\n\n    # 2. 跑迴圈：遍歷每個 objective 以及裡面的 keywords\n \
          \   for obj in objectives:\n        if not isinstance(obj, dict):\n    \
          \        continue\n            \n        raw_keywords = obj.get(\"keywords\"\
          , [])\n        new_keywords = []\n        \n        for kw in raw_keywords:\n\
          \            # 確保單字是字串格式 (相容純字串或物件格式)\n            en_word = \"\"\n    \
          \        if isinstance(kw, str):\n                en_word = kw.strip()\n\
          \            elif isinstance(kw, dict):\n                en_word = str(kw.get(\"\
          en\", \"\")).strip()\n\n            if not en_word:\n                continue\n\
          \                \n            image_url = \"\"\n            \n        \
          \    # 3. 呼叫 Pixabay API 搜尋圖片\n            try:\n                safe_query\
          \ = urllib.parse.quote(en_word)\n                url = f\"https://pixabay.com/api/?key={PIXABAY_API_KEY}&q={safe_query}&image_type=illustration&per_page=3&safesearch=true\"\
          \n                \n                resp = session.get(url, timeout=3)\n\
          \n                if resp.status_code == 200:\n                    data\
          \ = resp.json()\n                    # 如果有找到圖片，取第一張\n                  \
          \  if data.get(\"totalHits\", 0) > 0 and data.get(\"hits\"):\n         \
          \               image_url = data[\"hits\"][0].get(\"largeImageURL\", \"\"\
          )\n            except Exception:\n                pass # 發生網路錯誤或 Timeout\
          \ 時，直接略過，保持 URL 為空\n            \n            # 4. 將原本的資料升級為包含大圖 URL 的 Object\n\
          \            kw_obj = {\n                \"en\": en_word,\n            \
          \    \"image_url\": image_url\n            }\n            # 如果原本的 kw 已經有\
          \ zh 或 example，順便保留下來\n            if isinstance(kw, dict):\n          \
          \      if \"zh\" in kw: kw_obj[\"zh\"] = kw[\"zh\"]\n                if\
          \ \"example\" in kw: kw_obj[\"example\"] = kw[\"example\"]\n\n         \
          \   new_keywords.append(kw_obj)\n            \n        # 5. 覆寫原本的 keywords\
          \ 陣列\n        obj[\"keywords\"] = new_keywords\n\n    session.close()\n\n\
          \    # 6. 確保回傳更新後、結構更豐富的 JSON \"字串 (String)\"\n    return {\n        \"\
          updated_objectives\": json.dumps(objectives, ensure_ascii=False, indent=2)\n\
          \    }"
